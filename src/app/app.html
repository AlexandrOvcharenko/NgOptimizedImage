<div class="app-shell">
  <aside class="sidebar" aria-label="Learning sections">
    <a class="brand" routerLink="/" aria-label="Image Optimization Lab home">
      <span class="brand-mark" aria-hidden="true">IO</span>
      <span>
        <strong>Image Optimization Lab</strong>
        <small>NgOptimizedImage skeleton</small>
      </span>
    </a>

    <nav class="section-nav" aria-label="Demo navigation">
      @for (section of sections; track section.path) {
        <a
          class="nav-link"
          [routerLink]="section.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: section.path === '/' }"
        >
          <span>{{ section.order }}</span>
          {{ section.shortTitle }}
        </a>
      }
    </nav>
  </aside>

  <main class="content" tabindex="-1">
    <router-outlet />
  </main>
</div>
