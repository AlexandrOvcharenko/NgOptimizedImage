<article class="demo-page">
  <header class="page-header">
    <p class="eyebrow">Exercise {{ section().order }}</p>
    <h1>{{ section().title }}</h1>
    <p>{{ section().summary }}</p>
  </header>

  <section class="panel" aria-labelledby="goals-heading">
    <h2 id="goals-heading">Learning Goals</h2>
    <ul class="goal-list">
      @for (goal of section().learningGoals; track goal) {
        <li>{{ goal }}</li>
      }
    </ul>
  </section>

  <section class="workspace-grid" aria-label="Exercise workspace">
    <div class="panel exercise-panel">
      <h2>Your Exercise Slot</h2>
      <ng-content select="[exercise]" />
    </div>

    <aside class="panel">
      <h2>Verification Checklist</h2>
      <ul class="check-list">
        @for (item of checklist(); track item) {
          <li>{{ item }}</li>
        }
      </ul>
    </aside>
  </section>

  <section class="panel" aria-labelledby="notes-heading">
    <h2 id="notes-heading">Notes</h2>
    <ng-content select="[notes]" />
  </section>
</article>
