<app-demo-shell [section]="section" [checklist]="checklist">
  <div exercise>
    <div class="comparison-grid">
      <article class="comparison-cell">
        <h3>Cover frame</h3>
        <div class="exercise-slot fill-frame cover-frame">
          <img class="fill-image cover-image" ngSrc="/coffee.jpg" fill alt="Coffee beans" />
        </div>
      </article>

      <article class="comparison-cell">
        <h3>Contain frame</h3>
        <div class="exercise-slot fill-frame contain-frame">
          <img class="fill-image contain-image" ngSrc="/coffee.jpg" fill alt="Coffee beans" />
        </div>
      </article>
    </div>

    <app-code-block label="Fill mode examples" [code]="exampleCode" />
  </div>

  <div notes>
    <p>
      Both examples use fill, so the parent frame controls the size. The cover example crops the
      image to fill the whole frame, while the contain example keeps the whole image visible.
    </p>
  </div>
</app-demo-shell>
