<app-demo-shell [section]="section" [checklist]="checklist">
  <div exercise>
    <div class="comparison-grid">
      <article class="background-demo old-background">
        <h3>CSS background slot</h3>
        <div
          class="exercise-slot compact migration-frame migration-css-panel"
          role="img"
          aria-label="Sneakers shown as a CSS background"
        ></div>
      </article>

      <article class="background-demo migrated-background">
        <h3>Image element slot</h3>
        <div class="exercise-slot compact fill-frame migration-frame">
          <img
            class="fill-image cover-image"
            ngSrc="sneakers.jpg"
            fill
            sizes="(max-width: 900px) 100vw, 50vw"
            alt="Pair of sneakers on a light studio background"
          />
        </div>
      </article>
    </div>
  </div>

  <div notes>
    <p>
      Match visual framing first (cover + centered crop), then contrast loading: CSS backgrounds do
      not participate in <code>NgOptimizedImage</code> diagnostics or responsive srcset unless you
      build URLs yourself.
    </p>
  </div>
</app-demo-shell>
