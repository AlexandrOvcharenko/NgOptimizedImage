<app-demo-shell [section]="section" [checklist]="checklist">
  <div exercise>
    <div class="responsive-layout">
      <main class="wide-column">
        <h3>Wide column</h3>
        <div class="exercise-slot compact">
          <!-- TODO: Add a responsive image for the wide column yourself. -->
          <p>This column becomes full width on small screens.</p>
        </div>
      </main>

      <aside class="narrow-column">
        <h3>Sidebar</h3>
        <div class="exercise-slot compact">
          <!-- TODO: Add a smaller responsive image for the sidebar yourself. -->
          <p>This column should request a smaller candidate.</p>
        </div>
      </aside>
    </div>

    <app-code-block label="Starting template" [code]="startingPoint" />
  </div>

  <div notes>
    <p>
      Use this route with responsive browser resizing. The skeleton gives you two different layout
      widths so your sizes experiments have a visible reason to differ.
    </p>
  </div>
</app-demo-shell>
