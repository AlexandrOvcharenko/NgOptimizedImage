<app-demo-shell [section]="section" [checklist]="checklist">
  <div exercise>
    <div class="responsive-layout">
      <main class="wide-column">
        <h3>Wide column</h3>
        <div class="exercise-slot compact responsive-frame">
          <img
            class="responsive-image"
            ngSrc="/coffee.jpg"
            width="4889"
            height="3728"
            sizes="(max-width: 900px) 100vw, 60vw"
            alt="Coffee beans"
          />
        </div>
      </main>

      <aside class="narrow-column">
        <h3>Sidebar</h3>
        <div class="exercise-slot compact responsive-frame">
          <img
            class="responsive-image"
            ngSrc="/coffee.jpg"
            width="4889"
            height="3728"
            sizes="(max-width: 900px) 100vw, 30vw"
            alt="Coffee beans"
          />
        </div>
      </aside>
    </div>

    <app-code-block label="Responsive examples" [code]="exampleCode" />
  </div>

  <div notes>
    <p>
      Both examples use the same source image, but their sizes values describe different layout
      widths. Resize the viewport and inspect how the rendered size changes.
    </p>
  </div>
</app-demo-shell>
