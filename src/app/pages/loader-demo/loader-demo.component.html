<app-demo-shell [section]="section" [checklist]="checklist">
  <div exercise>
    <div class="exercise-slot image-stage">
      <img
        ngSrc="sneakers.jpg"
        width="2898"
        height="3624"
        sizes="(max-width: 720px) 100vw, min(720px, 90vw)"
        alt="Test sneakers photo from imgix Asset Manager"
      />
    </div>
  </div>

  <div notes>
    <p>
      Loader configuration lives in <code>src/app/image-loaders/image-loader.config.ts</code>; the
      provider is registered in <code>app.config.ts</code>.
    </p>
  </div>
</app-demo-shell>
